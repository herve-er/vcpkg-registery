name: Update Port

on:
  workflow_dispatch:
    inputs:
      port-name:
        description: "Name of the port to update"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-port:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate port exists
        run: |
          if [ ! -d "ports/${{ inputs.port-name }}" ]; then
            echo "::error::Port '${{ inputs.port-name }}' does not exist in the registry"
            exit 1
          fi

      - name: Extract repo and current version
        id: current
        run: |
          REPO=$(grep -oP 'REPO\s+\K\S+' "ports/${{ inputs.port-name }}/portfile.cmake")
          VERSION=$(jq -r '.version' "ports/${{ inputs.port-name }}/vcpkg.json")
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get latest release
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api "repos/${{ steps.current.outputs.repo }}/releases/latest" --jq '.tag_name')
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check
        run: |
          if [ "${{ steps.current.outputs.version }}" = "${{ steps.latest.outputs.version }}" ]; then
            echo "::notice::Port '${{ inputs.port-name }}' is already at the latest version (${{ steps.latest.outputs.version }})"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Updating ${{ inputs.port-name }} from ${{ steps.current.outputs.version }} to ${{ steps.latest.outputs.version }}"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download source and compute SHA512
        if: steps.check.outputs.needed == 'true'
        id: sha
        run: |
          curl -fsSL "https://github.com/${{ steps.current.outputs.repo }}/archive/refs/tags/${{ steps.latest.outputs.tag }}.tar.gz" -o source.tar.gz
          SHA512=$(sha512sum source.tar.gz | awk '{print $1}')
          echo "sha512=$SHA512" >> "$GITHUB_OUTPUT"

      - name: Update port files
        if: steps.check.outputs.needed == 'true'
        run: |
          sed -i "s|SHA512 .*|SHA512 ${{ steps.sha.outputs.sha512 }}|" "ports/${{ inputs.port-name }}/portfile.cmake"
          jq --arg v "${{ steps.latest.outputs.version }}" '.version = $v' "ports/${{ inputs.port-name }}/vcpkg.json" > tmp.json && mv tmp.json "ports/${{ inputs.port-name }}/vcpkg.json"

      - name: Setup vcpkg
        if: steps.check.outputs.needed == 'true'
        run: |
          git clone https://github.com/microsoft/vcpkg.git /tmp/vcpkg --depth 1
          /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Create branch, commit, and update version database
        if: steps.check.outputs.needed == 'true'
        run: |
          BRANCH="update/${{ inputs.port-name }}-${{ steps.latest.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          git add "ports/${{ inputs.port-name }}"
          git commit -m "Update ${{ inputs.port-name }} to ${{ steps.latest.outputs.version }}"

          /tmp/vcpkg/vcpkg --x-builtin-ports-root=./ports --x-builtin-registry-versions-dir=./versions x-add-version --all --verbose

          git add versions/
          git commit --amend -m "Update ${{ inputs.port-name }} to ${{ steps.latest.outputs.version }}"

          git push origin "$BRANCH"

      - name: Create pull request
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "Update ${{ inputs.port-name }} to ${{ steps.latest.outputs.version }}" \
            --body "Automated update of **${{ inputs.port-name }}** from \`${{ steps.current.outputs.version }}\` to \`${{ steps.latest.outputs.version }}\`.<br><br>Source: [Release ${{ steps.latest.outputs.tag }}](https://github.com/${{ steps.current.outputs.repo }}/releases/tag/${{ steps.latest.outputs.tag }})" \
            --base main
